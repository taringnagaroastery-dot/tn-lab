<!-- Service Worker registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => { window.__swReg = reg; })
      .catch(err => console.warn('SW register failed:', err));
  });
}
// Capture install prompt for later use
window.__deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  window.__deferredInstallPrompt = e;
  window.dispatchEvent(new CustomEvent('tn:installprompt-ready'));
});
window.addEventListener('appinstalled', () => {
  window.__deferredInstallPrompt = null;
  window.dispatchEvent(new CustomEvent('tn:installed'));
});
</script>
<style>
:root{
  /* Brand colors — taring naga design system */
  --maroon:#5a0f1a;
  --maroon-deep:#3d0810;
  --maroon-light:#7a1a26;
  --cotton:#f5efe6;
  --cotton-deep:#ebe3d4;
  --gold:#c9a961;
  --gold-soft:#b8965a;
  --black:#0a0606;
  --line:rgba(245,239,230,.15);
  --line-dark:rgba(10,6,6,.12);

  /* Derived (subtle surfaces over maroon) */
  --surface:rgba(245,239,230,.04);
  --surface-2:rgba(245,239,230,.06);
  --surface-hover:rgba(245,239,230,.08);

  /* Semantic */
  --ok:#7aa07a;
  --warn:#d4a24a;
  --danger:#c2553f;

  /* Layout tokens */
  --page-x:clamp(20px, 5vw, 56px);
  --section-y:clamp(48px, 7vh, 80px);
  --max-content:1280px;
  --nav-h:80px;

  /* Fonts */
  --display:'Cormorant Garamond', Georgia, serif;
  --serif:'Cormorant Garamond', Georgia, serif;
  --sans:'Inter', system-ui, -apple-system, sans-serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;
}
@media (max-width:768px){ :root{ --nav-h:64px; } }

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%}
html{background:var(--maroon-deep);color:var(--cotton);font-family:var(--sans);font-size:15px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
body{margin:0;background:var(--maroon-deep);font-weight:400;line-height:1.6;letter-spacing:.005em;overflow:hidden}

::selection{background:var(--gold);color:var(--maroon-deep)}

/* Typography */
h1,h2,h3,h4{font-family:var(--display);font-weight:400;letter-spacing:-.005em;line-height:1.15;margin:0;color:var(--cotton)}
em,i{font-family:var(--serif);font-style:italic;color:var(--gold-soft);font-weight:400}
.serif{font-family:var(--serif)}
.italic{font-family:var(--serif);font-style:italic;color:var(--gold-soft)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500}
.label{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(245,239,230,.15);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(245,239,230,.25)}

/* App shell */
.app{display:grid;grid-template-columns:260px 1fr;height:100%;position:relative}
.sidebar{
  background:var(--maroon-deep);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  padding:28px 22px 24px;
  overflow-y:auto;
  gap:2px;
}
.brand{display:flex;gap:14px;align-items:center;padding:0 4px 24px;margin-bottom:18px;border-bottom:1px solid var(--line)}
.brand-mark{flex:none;display:grid;place-items:center}
.brand-name{font-family:var(--display);font-size:24px;font-weight:400;line-height:1;color:var(--cotton);letter-spacing:-.01em}
.brand-sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-top:6px;font-weight:500}

.nav-section{font-family:var(--mono);font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-soft);padding:18px 6px 8px;font-weight:500;opacity:.7}
.nav-item{
  display:flex;align-items:center;gap:14px;
  padding:11px 12px;border-radius:2px;
  color:var(--cotton);opacity:.65;
  cursor:pointer;font-size:14px;font-weight:400;
  border-left:2px solid transparent;
  transition:opacity .3s cubic-bezier(0.16,1,0.3,1), color .3s, border-color .3s;
}
.nav-item:hover{opacity:1}
.nav-item.active{opacity:1;color:var(--cotton);border-left-color:var(--gold)}
.nav-item .ico{width:18px;height:18px;color:currentColor;flex:none;opacity:.8}
.nav-item.active .ico{color:var(--gold);opacity:1}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--gold);font-weight:500}

.main{display:flex;flex-direction:column;overflow:hidden;background:var(--maroon);position:relative}
.topbar{
  height:var(--nav-h);flex:none;border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 var(--page-x);gap:18px;
  background:var(--maroon);
}
.topbar .crumbs{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;margin-bottom:4px;font-weight:500}
.topbar h1{font-size:clamp(22px, 2.5vw, 30px);color:var(--cotton);font-weight:400}
.topbar-spacer{flex:1}
.chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:999px;border:1px solid var(--line);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--cotton);opacity:.7;background:transparent;font-weight:500;
}
.chip .dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}

.content{flex:1;overflow-y:auto;padding:var(--section-y) var(--page-x);scroll-behavior:smooth}
.content-inner{max-width:var(--max-content);margin:0 auto}

/* Cards — flat editorial */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:2px;
  padding:28px;
}
.card-h{margin-bottom:22px}
.card-h h3{font-size:clamp(22px, 2.4vw, 30px);color:var(--cotton);font-weight:400;margin-top:6px}
.card-h .eyebrow{display:block}

/* Section divider line + mark */
.sec-mark{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.sec-mark .line{flex:1;height:1px;background:var(--line)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:11px 22px;border-radius:0;
  border:1px solid var(--line);background:transparent;
  color:var(--cotton);cursor:pointer;
  font-family:var(--mono);font-size:11px;font-weight:500;
  letter-spacing:.18em;text-transform:uppercase;
  transition:all .35s cubic-bezier(0.16,1,0.3,1);
}
.btn:hover{border-color:var(--gold);color:var(--gold);letter-spacing:.22em}
.btn.primary{background:var(--gold);border-color:var(--gold);color:var(--maroon-deep)}
.btn.primary:hover{background:transparent;color:var(--gold);letter-spacing:.22em}
.btn.ghost{border-color:transparent;opacity:.7}
.btn.ghost:hover{opacity:1;border-color:var(--line)}
.btn.danger{border-color:rgba(194,85,63,.45);color:var(--danger)}
.btn.danger:hover{border-color:var(--danger);background:rgba(194,85,63,.08)}
.btn.sm{padding:7px 14px;font-size:10px;letter-spacing:.16em}
.btn.icon{padding:9px;width:36px;height:36px;justify-content:center}
.btn.icon:hover{letter-spacing:0}

/* Inputs */
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500;opacity:.85}
.input,.select,textarea.input{
  width:100%;
  background:transparent;
  border:none;border-bottom:1px solid var(--line);
  border-radius:0;
  padding:9px 0 9px 2px;
  color:var(--cotton);
  font-family:var(--sans);font-size:14px;font-weight:400;
  outline:none;
  transition:border-color .35s cubic-bezier(0.16,1,0.3,1);
}
.input:focus,.select:focus,textarea.input:focus{border-bottom-color:var(--gold)}
.input::placeholder{color:rgba(245,239,230,.35)}
.input.mono{font-family:var(--mono);font-size:13.5px}
.select{
  appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%23c9a961'><path d='M1 3l4 4 4-4z'/></svg>");
  background-repeat:no-repeat;background-position:right 2px center;padding-right:24px;
}
.select option{background:var(--maroon-deep);color:var(--cotton)}
textarea.input{min-height:80px;resize:vertical;border:1px solid var(--line);padding:12px;border-radius:0}
textarea.input:focus{border-color:var(--gold)}
.checkbox{display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-size:13.5px;color:var(--cotton);opacity:.85}
.checkbox input{accent-color:var(--gold);width:15px;height:15px}

/* Stars */
.stars{display:inline-flex;gap:5px;cursor:pointer}
.stars .star{width:18px;height:18px;color:var(--line-dark);transition:transform .25s cubic-bezier(0.16,1,0.3,1);color:rgba(245,239,230,.2)}
.stars .star.on{color:var(--gold)}
.stars .star:hover{transform:scale(1.1)}
.stars.lg .star{width:24px;height:24px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{
  text-align:left;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);font-weight:500;
  padding:14px 14px;
  border-bottom:1px solid var(--line);
  background:transparent;
  position:sticky;top:0;z-index:1;
}
.tbl td{padding:16px 14px;border-bottom:1px solid var(--line);color:var(--cotton);opacity:.9;vertical-align:middle;font-weight:400}
.tbl tr:hover td{background:var(--surface)}
.tbl tr.clickable{cursor:pointer}
.tbl tr.clickable:hover td{color:var(--cotton);opacity:1}

/* Pills */
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 11px;border-radius:999px;
  font-family:var(--mono);font-size:9.5px;font-weight:500;
  letter-spacing:.16em;text-transform:uppercase;
  border:1px solid var(--line);
  background:transparent;
  color:var(--cotton);opacity:.8;
}
.pill.gold{color:var(--gold);border-color:rgba(201,169,97,.4)}
.pill.warn{color:var(--warn);border-color:rgba(212,162,74,.4);background:rgba(212,162,74,.05)}
.pill.ok{color:var(--ok);border-color:rgba(122,160,122,.4)}
.pill.crimson{color:var(--cotton);border-color:rgba(194,85,63,.4);background:rgba(194,85,63,.06)}

.roast-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:3px 12px 3px 9px;border-radius:999px;
  font-family:var(--mono);font-size:9.5px;font-weight:500;
  letter-spacing:.16em;text-transform:uppercase;
  border:1px solid var(--line);
  background:transparent;
  color:var(--cotton);opacity:.85;
}
.roast-pill::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--bg,#c9a961)}

/* KPI — large editorial numbers */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--line);border:1px solid var(--line)}
.kpi{
  background:var(--maroon);
  padding:30px 28px;
  display:flex;flex-direction:column;gap:10px;
}
.kpi .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500}
.kpi .val{font-family:var(--display);font-size:clamp(34px, 4.5vw, 52px);color:var(--cotton);font-weight:400;line-height:1;letter-spacing:-.01em}
.kpi .sub{font-size:12px;color:var(--cotton);opacity:.65;font-weight:400;line-height:1.5}

.progress{height:1px;background:var(--line);overflow:hidden;margin-top:6px}
.progress > div{height:100%;background:var(--gold);transition:width .8s cubic-bezier(0.16,1,0.3,1)}

/* Hero quote */
.hero-quote{
  font-family:var(--serif);font-style:italic;
  font-size:clamp(20px, 2vw, 26px);
  color:var(--gold-soft);line-height:1.4;
  font-weight:300;
  margin:8px 0;
}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(10,6,6,.7);backdrop-filter:blur(8px);z-index:60;display:grid;place-items:center;padding:24px;animation:fade .3s ease}
.modal{
  background:var(--maroon-deep);
  border:1px solid var(--line);
  border-radius:2px;
  max-width:920px;width:100%;max-height:92vh;overflow:auto;
}
.modal-h{display:flex;align-items:center;padding:24px 32px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--maroon-deep);z-index:2}
.modal-h h2{font-size:clamp(22px, 2.4vw, 30px);color:var(--cotton);font-weight:400}
.modal-h .close{margin-left:auto;cursor:pointer;color:var(--cotton);opacity:.6;padding:8px;transition:opacity .3s, color .3s}
.modal-h .close:hover{opacity:1;color:var(--gold)}
.modal-b{padding:28px 32px}
.modal-f{padding:18px 32px;border-top:1px solid var(--line);display:flex;gap:12px;justify-content:flex-end;position:sticky;bottom:0;background:var(--maroon-deep)}

/* Toast */
.toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:80;pointer-events:none}
.toast{
  background:var(--maroon-deep);
  border:1px solid var(--line);
  border-left:2px solid var(--gold);
  border-radius:2px;
  padding:14px 20px;
  color:var(--cotton);
  font-size:13px;font-weight:400;
  min-width:280px;
  animation:slideUp .4s cubic-bezier(0.16,1,0.3,1);
  pointer-events:auto;
}
.toast.ok{border-left-color:var(--gold)}
.toast.err{border-left-color:var(--danger)}
.toast.warn{border-left-color:var(--warn)}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* Curve chart */
.curve-wrap{
  background:var(--maroon-deep);
  border:1px solid var(--line);
  border-radius:2px;
  padding:20px;
}
.curve-wrap canvas{display:block}

/* POS layout */
.pos-grid{display:grid;grid-template-columns:1fr 400px;gap:24px;align-items:flex-start}
.pos-cart{
  background:var(--maroon-deep);
  border:1px solid var(--line);
  border-radius:2px;
  display:flex;flex-direction:column;overflow:hidden;
  position:sticky;top:0;max-height:calc(100vh - 200px);
}
.pos-cart-h{padding:22px 22px;border-bottom:1px solid var(--line)}
.pos-cart-items{flex:1;overflow-y:auto;padding:10px 18px}
.pos-cart-foot{padding:22px;border-top:1px solid var(--line)}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--line);border:1px solid var(--line)}
.menu-tile{
  background:var(--maroon);
  padding:22px;cursor:pointer;
  transition:background .4s cubic-bezier(0.16,1,0.3,1);
  position:relative;
}
.menu-tile:hover{background:var(--maroon-light)}
.menu-tile .name{font-family:var(--display);font-size:22px;color:var(--cotton);line-height:1.2;margin:8px 0 6px;font-weight:400}
.menu-tile .price{font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:500;margin-top:14px;letter-spacing:.04em}
.menu-tile .meta{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.18em;font-weight:500}

/* Cart row */
.cart-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:14px 0;border-bottom:1px solid var(--line)}
.cart-row:last-child{border-bottom:none}
.qty{display:inline-flex;align-items:center;border:1px solid var(--line)}
.qty button{width:30px;height:30px;background:transparent;border:none;color:var(--cotton);cursor:pointer;font-size:15px;font-family:var(--sans);transition:color .25s}
.qty button:hover{color:var(--gold)}
.qty span{width:34px;text-align:center;font-family:var(--mono);font-size:12.5px}

/* Receipt — paper feel */
.receipt{
  background:var(--cotton);color:var(--black);
  font-family:var(--mono);font-size:11.5px;
  padding:24px 18px;border-radius:0;
  max-width:320px;margin:0 auto;line-height:1.7;
}
.receipt h4{font-family:var(--display);text-align:center;margin:0 0 4px;font-size:22px;color:var(--maroon-deep);font-weight:400}
.receipt .rcpt-sub{text-align:center;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--maroon);margin-bottom:12px;font-weight:500}
.receipt .rcpt-div{border-top:1px dashed rgba(10,6,6,.3);margin:10px 0}
.receipt .rcpt-row{display:flex;justify-content:space-between;gap:10px}
.receipt .rcpt-row.tot{font-weight:500;font-size:13px;color:var(--maroon-deep)}

/* Mobile nav */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--maroon-deep);border-top:1px solid var(--line);padding:6px 4px env(safe-area-inset-bottom);z-index:50;justify-content:space-around}
.mobile-nav .nav-item{flex-direction:column;gap:4px;padding:10px 8px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;border:none;border-radius:0;opacity:.6}
.mobile-nav .nav-item.active{opacity:1;color:var(--gold);border:none}
.mobile-nav .nav-item.active .ico{color:var(--gold)}
.mobile-nav .nav-item .ico{width:20px;height:20px}

/* Responsive */
@media (max-width: 880px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .sidebar{display:none}
  .mobile-nav{display:flex !important}
  .topbar{padding:0 16px;height:64px}
  .content{padding:36px 16px 100px}
  .pos-grid{grid-template-columns:1fr}
  .pos-cart{position:fixed;left:0;right:0;bottom:60px;border-radius:0;max-height:60vh;z-index:30;transform:translateY(calc(100% - 64px));transition:transform .5s cubic-bezier(0.16,1,0.3,1)}
  .pos-cart.open{transform:translateY(0)}
  .card{padding:24px 20px}
}

/* Utility */
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
@media (max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;gap:16px}}
.gap-sm{gap:8px}.gap-md{gap:16px}.gap-lg{gap:32px;}.gap-xl{gap:48px}
.mt-sm{margin-top:8px}.mt-md{margin-top:16px}.mt-lg{margin-top:28px}.mt-xl{margin-top:44px}
.mb-sm{margin-bottom:8px}.mb-md{margin-bottom:16px}.mb-lg{margin-bottom:28px}
.muted{color:var(--cotton);opacity:.5}
.dim{color:var(--cotton);opacity:.75}

   MODERN MOTION — cursor accent, reveal, lifts, sheen
   ============================================================ */

/* Cursor accent — subtle gold halo following pointer */

  position:fixed;left:0;top:0;
  width:520px;height:520px;
  background:radial-gradient(circle, rgba(201,169,97,.07), rgba(201,169,97,.02) 40%, transparent 70%);
  pointer-events:none;z-index:0;
  transform:translate(-50%,-50%);
  opacity:0;
  transition:opacity .8s cubic-bezier(0.16,1,0.3,1);
  mix-blend-mode:screen;
  will-change:transform;
}
@media (max-width:768px){.cursor-glow{display:none}}

/* Scroll reveal — opacity + slight rise */
.reveal{opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(0.16,1,0.3,1), transform 1s cubic-bezier(0.16,1,0.3,1)}

.reveal[data-d="2"]{transition-delay:.16s}
.reveal[data-d="3"]{transition-delay:.24s}
.reveal[data-d="4"]{transition-delay:.32s}
.reveal[data-d="5"]{transition-delay:.40s}

/* Page entry */
.fade-in{animation:pageEnter .65s cubic-bezier(0.16,1,0.3,1)}
@keyframes pageEnter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Modal scale + fade entry */
.modal{animation:modalIn .55s cubic-bezier(0.16,1,0.3,1)}
.modal-back{animation:backIn .35s cubic-bezier(0.16,1,0.3,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
@keyframes backIn{from{opacity:0;backdrop-filter:blur(0)}to{opacity:1}}

/* KPI sheen sweep on hover */
.kpi{position:relative;overflow:hidden;transition:transform .55s cubic-bezier(0.16,1,0.3,1)}
.kpi::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg, transparent 30%, rgba(201,169,97,.08) 50%, transparent 70%);
  transform:translateX(-100%);
  transition:transform 1.1s cubic-bezier(0.16,1,0.3,1);

}
.kpi:hover::after{transform:translateX(100%)}

/* Toast — slide + slight scale */

const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

/* ============================================================
   ESC/POS THERMAL PRINTER (Web Bluetooth)
   ============================================================ */
const ESC = {
  INIT: [0x1B, 0x40],
  ALIGN_L: [0x1B, 0x61, 0x00],
  ALIGN_C: [0x1B, 0x61, 0x01],
  ALIGN_R: [0x1B, 0x61, 0x02],
  BOLD_ON: [0x1B, 0x45, 0x01],
  BOLD_OFF: [0x1B, 0x45, 0x00],
  TXT_NORMAL: [0x1D, 0x21, 0x00],
  TXT_2H:     [0x1D, 0x21, 0x01],
  TXT_2W:     [0x1D, 0x21, 0x10],
  TXT_2WH:    [0x1D, 0x21, 0x11],
  LF: [0x0A],
  CUT: [0x1D, 0x56, 0x00],
  FEED: (n)=>[0x1B, 0x64, n & 0xff],
  CHARSET: [0x1B, 0x52, 0x00],
  CODEPAGE_CP437: [0x1B, 0x74, 0x00],
};

class BluetoothPrinter {
  constructor(){ this.device=null; this.characteristic=null; this.lastName=''; }
  get connected(){ return !!(this.device?.gatt?.connected && this.characteristic); }
  async connect(){
    if(!navigator.bluetooth) throw new Error('Web Bluetooth tidak didukung browser ini. Pakai Chrome/Edge desktop atau Chrome Android.');
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '000018f0-0000-1000-8000-00805f9b34fb',
        '0000ff00-0000-1000-8000-00805f9b34fb',
        '0000ffe0-0000-1000-8000-00805f9b34fb',
        '49535343-fe7d-4ae5-8fa9-9fafd205e455',
        '0000fee7-0000-1000-8000-00805f9b34fb',
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e',
      ],
    });
    this.device = device;
    this.lastName = device.name || 'Unknown';
    device.addEventListener('gattserverdisconnected', ()=>{ this.characteristic=null; });
    const server = await device.gatt.connect();
    const services = await server.getPrimaryServices();
    let foundChar = null;
    for(const svc of services){
      try{
        const chars = await svc.getCharacteristics();
        for(const c of chars){
          if(c.properties.write || c.properties.writeWithoutResponse){
            foundChar = c; break;
          }
        }
        if(foundChar) break;
      }catch(_){}
    }
    if(!foundChar) throw new Error('Karakteristik tulis tidak ditemukan. Pastikan printer ESC/POS dan dalam pairing mode.');
    this.characteristic = foundChar;
    return { name: this.lastName, id: device.id };
  }
  async disconnect(){ try{ this.device?.gatt?.disconnect(); }catch(_){} this.characteristic=null; this.device=null; }
  async send(bytes){
    if(!this.characteristic) throw new Error('Printer belum terkoneksi.');
    const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
    const CHUNK = 100;
    for(let i=0;i<arr.length;i+=CHUNK){
      const slice = arr.subarray(i, Math.min(i+CHUNK, arr.length));
      if(this.characteristic.properties.writeWithoutResponse){
        await this.characteristic.writeValueWithoutResponse(slice);
      } else {
        await this.characteristic.writeValue(slice);
      }
      await new Promise(r=> setTimeout(r, 25));
    }
  }
}

const printerSingleton = new BluetoothPrinter();

function encAscii(s){
  const out = [];
  for(const ch of (s||'')){
    const code = ch.codePointAt(0);
    // Map common typography to ASCII to avoid garbled prints
    const map = {0x2014:'-', 0x2013:'-', 0x2022:'*', 0x2018:"'", 0x2019:"'", 0x201C:'"', 0x201D:'"', 0xA0:' ', 0xB0:'o'};
    if(map[code]!==undefined){ for(const c of map[code]) out.push(c.charCodeAt(0)); continue; }
    out.push(code < 128 ? code : 0x3F);
  }
  return out;
}
function padBetween(left, right, width){
  const space = Math.max(1, width - String(left).length - String(right).length);
  return String(left) + ' '.repeat(space) + String(right);
}
function fmtIDR_short(n){ return 'Rp ' + Math.round(n||0).toLocaleString('id-ID'); }

function buildReceiptBytes(order, settings, width=32){
  const out = [];
  const push = b => Array.isArray(b) ? out.push(...b) : out.push(b);
  const line = s => { push(encAscii(s)); push(ESC.LF); };
  const sep = () => line('-'.repeat(width));

  push(ESC.INIT); push(ESC.CHARSET); push(ESC.CODEPAGE_CP437);
  push(ESC.ALIGN_C); push(ESC.TXT_2WH); push(ESC.BOLD_ON);
  line((settings.businessName||'').toUpperCase());
  push(ESC.TXT_NORMAL); push(ESC.BOLD_OFF);
  if(settings.tagline) line(settings.tagline);
  if(settings.address) line(settings.address);
  if(settings.phone) line(settings.phone);
  sep();
  push(ESC.ALIGN_L);
  line('No.    : ' + (order.id||'').slice(-8).toUpperCase());
  line('Tgl    : ' + (order.date||'') + ' ' + (order.time||''));
  line('Channel: ' + (order.channel||'-'));
  line('Cust   : ' + (order.customer||'-'));
  sep();
  for(const it of (order.items||[])){
    push(ESC.BOLD_ON); line(it.name); push(ESC.BOLD_OFF);
    const l = `${it.qty} x ${fmtIDR_short(it.price)}`;
    const r = fmtIDR_short(it.subtotal);
    line(padBetween(l, r, width));
  }
  sep();
  push(ESC.BOLD_ON); push(ESC.TXT_2H);
  line(padBetween('TOTAL', fmtIDR_short(order.total), Math.floor(width/2)));
  push(ESC.TXT_NORMAL); push(ESC.BOLD_OFF);
  line(padBetween('Bayar', fmtIDR_short(order.paid), width));
  line(padBetween('Kembali', fmtIDR_short(Math.max(0,(order.paid||0)-(order.total||0))), width));
  sep();
  push(ESC.ALIGN_C);
  line('Terima kasih');
  line('"Kopi yang baik punya gigi."');
  push(ESC.LF);
  push(ESC.FEED(3));
  push(ESC.CUT);
  return new Uint8Array(out);
}

function buildTestPrintBytes(settings, width=32){
  const out = [];
  const push = b => Array.isArray(b) ? out.push(...b) : out.push(b);
  const line = s => { push(encAscii(s)); push(ESC.LF); };
  push(ESC.INIT); push(ESC.CHARSET); push(ESC.CODEPAGE_CP437);
  push(ESC.ALIGN_C); push(ESC.TXT_2WH); push(ESC.BOLD_ON);
  line((settings.businessName||'').toUpperCase());
  push(ESC.TXT_NORMAL); push(ESC.BOLD_OFF);
  line('Test Print');
  line(new Date().toLocaleString('id-ID'));
  line('-'.repeat(width));
  push(ESC.ALIGN_L);
  line('Bold:'); push(ESC.BOLD_ON); line('  abcdefghij 0123456789'); push(ESC.BOLD_OFF);
  line('Normal:'); line('  abcdefghij 0123456789');
  line('Right aligned:');
  push(ESC.ALIGN_R); line('Rp 1.234.567'); push(ESC.ALIGN_L);
  push(ESC.FEED(3)); push(ESC.CUT);
  return new Uint8Array(out);
}

/* ============================================================
   SYNC SERVICE — Google Apps Script + Sheet backend
   ============================================================ */
const SyncSvc = {
  status: 'idle', // 'idle' | 'syncing' | 'error'
  lastError: '',
  lastSyncAt: null,
  pulledCount: 0,
  listeners: new Set(),
  notify(){ for(const fn of this.listeners) try{ fn(); }catch(_){} },
  on(fn){ this.listeners.add(fn); return ()=> this.listeners.delete(fn); },
  setStatus(s, err){ this.status=s; this.lastError=err||''; this.notify(); },

  async test(endpoint, secret){
    if(!endpoint) throw new Error('Endpoint kosong');
    const url = endpoint + (endpoint.includes('?')?'&':'?') + 'action=health';
    const res = await fetch(url, { method:'GET', redirect:'follow' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  },

  async push(endpoint, secret, localState){
    if(!endpoint || !secret) throw new Error('Endpoint atau secret kosong');
    this.setStatus('syncing');
    try {
      const stamped = stampUpdatedAt(localState);
      const payload = {
        action: 'sync',
        secret,
        data: {
          beans: stamped.beans,
          products: stamped.products,
          roastLogs: stamped.roastLogs,
          cuppings: stamped.cuppings,
          orders: stamped.orders,
          settings: [{ id:'_settings', ...stamped.settings, updatedAt: stamped.settings.updatedAt || new Date().toISOString() }],
        }
      };
      const res = await fetch(endpoint, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload),
        redirect:'follow',
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      if(result.error) throw new Error(result.error);
      this.lastSyncAt = new Date().toISOString();
      this.setStatus('idle');
      return result.merged;
    } catch(err){
      this.setStatus('error', err.message || String(err));
      throw err;
    }
  },

  async pullIncoming(endpoint, secret){
    if(!endpoint || !secret) return [];
    const url = endpoint + (endpoint.includes('?')?'&':'?') + 'action=incoming&secret=' + encodeURIComponent(secret);
    const res = await fetch(url, { method:'GET', redirect:'follow' });
    if(!res.ok) return [];
    const data = await res.json();
    return data.orders || [];
  },

  async markImported(endpoint, secret, ids){
    if(!ids?.length) return;
    await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'mark_imported', secret, ids }),
      redirect:'follow',
    });
  },
};

function stampUpdatedAt(state){
  const now = new Date().toISOString();
  const stamp = arr => (arr||[]).map(it => it.updatedAt ? it : ({...it, updatedAt: now}));
  return {
    beans: stamp(state.beans),
    products: stamp(state.products),
    roastLogs: stamp(state.roastLogs),
    cuppings: stamp(state.cuppings),
    orders: stamp(state.orders),
    settings: state.settings.updatedAt ? state.settings : {...state.settings, updatedAt: now},
  };
}

function mergeStateFromServer(local, merged){
  const out = {};
  for(const key of ['beans','products','roastLogs','cuppings','orders']){
    out[key] = merged[key] || local[key];
  }
  // settings is a single object in local but array on server
  if(Array.isArray(merged.settings) && merged.settings.length){
    const srv = merged.settings.find(x=>x.id==='_settings') || merged.settings[0];
    const { id, ...rest } = srv;
    out.settings = { ...local.settings, ...rest };
  } else {
    out.settings = local.settings;
  }
  return out;
}

function genCurve(){
  const pts=[];
  for(let t=0;t<=24;t+=0.5){
    const T1 = t<1? 200 - 110*(1-t) : 90 + (210-90)*(1-Math.exp(-t/8)) - (t>20?5:0);
    const T2 = t<1? 230 : 230 - (230-205)*Math.min(1,t/10) - (t>18?3:0);
    pts.push({ t, T1: +T1.toFixed(1), T2: +T2.toFixed(1) });
  }
  return pts;
}

function computePricing(bean, weight, settings, markupPct){
  const susut = bean?.susut ?? settings.susutDefault;
  const hargaBeli = bean?.hargaBeli ?? 0;
  const totalCostPerKg = hargaBeli * (1 + susut);
  const beanCost = totalCostPerKg * (weight/1000);
  const hpp = beanCost + settings.packagingCost + settings.stickerCost + settings.roastingFee;
  const baseSell = hpp * (1 + (markupPct ?? settings.markupPct)/100);
  const roundUp = Math.ceil(baseSell/5000)*5000;
  return { totalCostPerKg, beanCost, hpp, baseSell, roundUp };
}

/* ============================================================
   MOTION HOOKS — count-up, reveal, cursor glow
   ============================================================ */
const prefersReducedMotion = () => typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function useCountUp(target, dur=900){
  const [val, setVal] = useState(target);
  const prev = useRef(target);
  useEffect(()=>{
    if(prefersReducedMotion()){ setVal(target); prev.current=target; return; }
    const from = prev.current;
    const to = +target || 0;
    if(from===to){ setVal(to); return; }
    let raf, start=null;
    const step = ts => {
      if(!start) start = ts;
      const t = Math.min(1, (ts-start)/dur);
      const ease = 1 - Math.pow(1-t, 3);
      setVal(from + (to-from)*ease);
      if(t<1) raf = requestAnimationFrame(step);
      else { prev.current = to; setVal(to); }
    };
    raf = requestAnimationFrame(step);
    return ()=> cancelAnimationFrame(raf);
  },[target,dur]);
  return val;
}

function Reveal({children, d=0, as:Tag='div', className='', style, ...rest}){
  const ref = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(prefersReducedMotion()){ ref.current.classList.add('in'); return; }
    const el = ref.current;
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){ el.classList.add('in'); io.unobserve(el); }
      });
    }, {threshold:0.1, rootMargin:'0px 0px -8% 0px'});
    io.observe(el);
    return ()=> io.disconnect();
  },[]);
  return <Tag ref={ref} className={"reveal "+className} data-d={d} style={style} {...rest}>{children}</Tag>;
}

function CursorGlow(){
  const ref = useRef(null);
  useEffect(()=>{
    if(prefersReducedMotion()) return;
    if(window.matchMedia('(hover:none)').matches) return;
    const el = ref.current; if(!el) return;
    let raf, x=window.innerWidth/2, y=window.innerHeight/2, tx=x, ty=y, idle;
    const onMove = e => {
      tx = e.clientX; ty = e.clientY;
      el.style.opacity = 1;
      clearTimeout(idle);
      idle = setTimeout(()=> el.style.opacity = 0, 1800);
    };
    const tick = () => {
      x += (tx-x)*0.10; y += (ty-y)*0.10;
      el.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(tick);
    };
    window.addEventListener('mousemove', onMove, {passive:true});
    raf = requestAnimationFrame(tick);
    return ()=>{ window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); clearTimeout(idle); };
  },[]);
  return <div className="cursor-glow" ref={ref} aria-hidden="true"/>;
}

    return ['dashboard','roast','inventory','pos','reports','settings'].includes(p) ? p : 'dashboard';
  });
  const [toasts,setToasts] = useState([]);
  const [installAvailable,setInstallAvailable] = useState(!!window.__deferredInstallPrompt);
  const [printerConnected,setPrinterConnected] = useState(false);
  const [syncTick,setSyncTick] = useState(0);
  const stateRef = useRef(state);
  useEffect(()=>{ stateRef.current = state; },[state]);

  useEffect(()=>{ Store.save(state); },[state]);

  // Auto-stamp updatedAt on entity changes
  const update = useCallback((patch)=>{
    setState(s => {
      const next = typeof patch==='function' ? patch(s) : patch;
      const now = new Date().toISOString();
      const stampList = (oldArr, newArr) => {
        if(!Array.isArray(newArr)) return newArr;
        const oldMap = new Map((oldArr||[]).map(x=>[x.id, x]));
        return newArr.map(it => {
          const o = oldMap.get(it.id);
          if(!o) return {...it, updatedAt: it.updatedAt||now};
          // shallow compare keys; if anything differs, bump updatedAt
          const oKeys = Object.keys(o), nKeys = Object.keys(it);
          let same = oKeys.length===nKeys.length;
          if(same){
            for(const k of nKeys){
              if(k==='updatedAt') continue;
              if(JSON.stringify(o[k]) !== JSON.stringify(it[k])){ same=false; break; }
            }
          }
          return same ? it : {...it, updatedAt: now};
        });
      };
      const merged = {...s, ...next};
      if(next.beans) merged.beans = stampList(s.beans, next.beans);
      if(next.products) merged.products = stampList(s.products, next.products);
      if(next.roastLogs) merged.roastLogs = stampList(s.roastLogs, next.roastLogs);
      if(next.cuppings) merged.cuppings = stampList(s.cuppings, next.cuppings);
      if(next.orders) merged.orders = stampList(s.orders, next.orders);
      if(next.settings) merged.settings = {...s.settings, ...next.settings, updatedAt: now};
      return merged;
    });
  },[]);

  const toast = useCallback((msg, kind='ok')=>{
    const id = Date.now()+Math.random();
    setToasts(t => [...t, {id, msg, kind}]);
    setTimeout(()=> setToasts(t => t.filter(x=>x.id!==id)), 3500);
  },[]);

  // Install prompt
  useEffect(()=>{
    const onReady = () => setInstallAvailable(!!window.__deferredInstallPrompt);
    const onInstalled = () => setInstallAvailable(false);
    window.addEventListener('tn:installprompt-ready', onReady);
    window.addEventListener('tn:installed', onInstalled);
    return ()=>{
      window.removeEventListener('tn:installprompt-ready', onReady);
      window.removeEventListener('tn:installed', onInstalled);
    };
  },[]);
  const triggerInstall = useCallback(async ()=>{
    const ev = window.__deferredInstallPrompt;
    if(!ev) { toast('Install belum tersedia. Coba menu browser → "Add to Home Screen".','warn'); return; }

    const { outcome } = await ev.userChoice;

    if(!syncEndpoint || !syncSecret || !syncInterval) return;

      if(!cancelled) timer = setTimeout(run, syncInterval*1000);

      if(cancelled) return;

        const incoming = await SyncSvc.pullIncoming(syncEndpoint, syncSecret);

function recommendArr(rec){
  if(Array.isArray(rec)) return rec;
  if(typeof rec==='string' && rec.trim()) return rec.split(',').map(x=>x.trim()).filter(Boolean);
  return [];
}
function computeDerived(l){
  const fc = +l.firstCrack||0, dt = +l.dropTime||0;
  const developmentTime = fc && dt && dt>fc ? +(dt-fc).toFixed(2) : null;
  const dtr = developmentTime && dt ? +((developmentTime/dt)*100).toFixed(1) : null;
  const bi = +l.batchSize||0, bo = +l.batchOut||0;
  const weightLoss = bi && bo && bi>bo ? +((bi-bo)/bi*100).toFixed(2) : null;
  return { developmentTime, dtr, weightLoss };
}

function RoastModule(){
  const { state, update, toast, pendingCuppings } = useApp();
  const [tab,setTab] = useState('history');
  const [editing,setEditing] = useState(null);
  const [cuppingFor,setCuppingFor] = useState(null);
  const [filterBean,setFilterBean] = useState('');
  const [filterLevel,setFilterLevel] = useState('');
  const [filterRoaster,setFilterRoaster] = useState('');
  const [filterProfile,setFilterProfile] = useState('');
  const [filterProcess,setFilterProcess] = useState('');
  const [sortBy,setSortBy] = useState('date');

  const cupBy = useMemo(()=> {
    const m={}; for(const c of state.cuppings) m[c.logId]=c; return m;
  },[state.cuppings]);

  const profiles = useMemo(()=> Array.from(new Set(state.roastLogs.map(l=>l.profile).filter(Boolean))), [state.roastLogs]);
  const processes = useMemo(()=> Array.from(new Set(state.beans.map(b=>b.process).filter(Boolean))), [state.beans]);

  const filtered = useMemo(()=>{
    let arr = [...state.roastLogs];
    if(filterBean) arr = arr.filter(l=>l.beanId===filterBean);
    if(filterLevel) arr = arr.filter(l=>l.roastLevel===filterLevel);
    if(filterRoaster) arr = arr.filter(l=>(l.roaster||'').toLowerCase().includes(filterRoaster.toLowerCase()));
    if(filterProfile) arr = arr.filter(l=>l.profile===filterProfile);
    if(filterProcess){
      arr = arr.filter(l=>{
        const b = state.beans.find(x=>x.id===l.beanId); return b?.process===filterProcess;
      });
    }
    if(sortBy==='date') arr.sort((a,b)=>b.date.localeCompare(a.date));
    if(sortBy==='score') arr.sort((a,b)=>((cupBy[b.id]?.score)||0)-((cupBy[a.id]?.score)||0));
    if(sortBy==='rating') arr.sort((a,b)=>((cupBy[b.id]?.rating)||0)-((cupBy[a.id]?.rating)||0));
    return arr;
  },[state.roastLogs,state.beans,filterBean,filterLevel,filterRoaster,filterProfile,filterProcess,sortBy,cupBy]);

  // Rec engine — per (bean name × process × roast level), score-based
  const recs = useMemo(()=>{
    const map={}; // key: beanId -> level -> {sum,n,logs}
    for(const l of state.roastLogs){
      const c = cupBy[l.id]; if(!c) continue;
      map[l.beanId] ??= {}; map[l.beanId][l.roastLevel] ??= {sum:0,n:0,logs:[],ratings:0};
      map[l.beanId][l.roastLevel].sum += c.score;
      map[l.beanId][l.roastLevel].n += 1;
      map[l.beanId][l.roastLevel].ratings += c.rating||0;
      map[l.beanId][l.roastLevel].logs.push(l.id);
    }
    const out=[];
    for(const bid of Object.keys(map)){
      const b = state.beans.find(x=>x.id===bid); if(!b) continue;
      // Best level
      let best=null;
      const levels=[];
      for(const lv of Object.keys(map[bid])){
        const e = map[bid][lv]; const avg=e.sum/e.n; const avgR=e.ratings/e.n;
        levels.push({level:lv,avg,avgR,n:e.n,logs:e.logs});
        if(!best || avg>best.avg) best={level:lv,avg,avgR,n:e.n,logs:e.logs};
      }
      out.push({bean:b, best, levels: levels.sort((a,b)=>b.avg-a.avg)});
    }
    return out.sort((a,b)=>b.best.avg-a.best.avg);
  },[state.roastLogs,state.beans,cupBy]);

  return (
    <div className="col gap-lg">
      <div className="tabs">
        <div className={"tab "+(tab==='history'?'active':'')} onClick={()=>setTab('history')}>History</div>
        <div className={"tab "+(tab==='new'?'active':'')} onClick={()=>{setEditing(null);setTab('new');}}>New Session</div>
        <div className={"tab "+(tab==='recommendations'?'active':'')} onClick={()=>setTab('recommendations')}>Rekomendasi</div>
        <div style={{flex:1}}/>
        {pendingCuppings.length>0 && (
          <div className="pill warn" style={{alignSelf:'center'}}><I name="bell" size={11}/>{pendingCuppings.length} cupping menunggu</div>
        )}
      </div>

      {tab==='history' && (
        <div className="col gap-md">
          <div className="row" style={{padding:'8px 0',borderBottom:'1px solid var(--line)',flexWrap:'wrap'}}>
            <I name="filter" size={14} color="var(--gold)"/>
            <select className="select" value={filterBean} onChange={e=>setFilterBean(e.target.value)} style={{maxWidth:180}}>
              <option value="">Semua Bean</option>
              {state.beans.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
            <select className="select" value={filterProcess} onChange={e=>setFilterProcess(e.target.value)} style={{maxWidth:170}}>
              <option value="">Semua Proses</option>
              {processes.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <select className="select" value={filterLevel} onChange={e=>setFilterLevel(e.target.value)} style={{maxWidth:160}}>
              <option value="">Semua Level</option>
              {ROAST_LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
            </select>
            <select className="select" value={filterProfile} onChange={e=>setFilterProfile(e.target.value)} style={{maxWidth:160}}>
              <option value="">Semua Profile</option>
              {profiles.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <input className="input" placeholder="Roaster" value={filterRoaster} onChange={e=>setFilterRoaster(e.target.value)} style={{maxWidth:130}}/>
            <select className="select" value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{maxWidth:170}}>
              <option value="date">Sort: Terbaru</option>
              <option value="score">Sort: Skor Tertinggi</option>
              <option value="rating">Sort: Rating Tertinggi</option>
            </select>
            <div style={{flex:1}}/>
            <button className="btn primary" onClick={()=>{setEditing(null);setTab('new');}}><I name="plus" size={12}/>Session</button>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                <th>Tanggal</th><th>Bean</th><th>Proses</th><th>Roaster</th><th>Level</th>
                <th>Profile</th><th>Batch In→Out</th><th>Loss%</th><th>1C → Drop</th>
                <th>DTR</th><th>Score</th><th>Rating</th><th></th>
              </tr></thead>
              <tbody>
                {filtered.map(l=>{
                  const c=cupBy[l.id];
                  const b=state.beans.find(x=>x.id===l.beanId);
                  const d=computeDerived(l);
                  return (
                    <tr key={l.id} className="clickable" onClick={()=>setEditing(l)}>
                      <td className="mono dim">{fmtDate(l.date)}{l.timeOfRoast?(<> <span className="tiny" style={{opacity:.5}}>{l.timeOfRoast}</span></>):null}</td>
                      <td className="bright" style={{fontFamily:'var(--display)',fontSize:17}}>{l.beanName}</td>
                      <td className="dim tiny">{b?.process||'—'}</td>
                      <td className="dim">{l.roaster||'—'}</td>
                      <td><span className="roast-pill" style={{'--bg':ROAST_COLORS[l.roastLevel]}}>{l.roastLevel}</span></td>
                      <td className="dim">{l.profile||'—'}</td>
                      <td className="mono dim">{l.batchSize||'—'}g{l.batchOut?<>→{l.batchOut}g</>:''}</td>
                      <td className="mono" style={{color: d.weightLoss?'var(--gold)':'rgba(245,239,230,.4)'}}>{d.weightLoss? d.weightLoss+'%':'—'}</td>
                      <td className="mono dim">{l.firstCrack||'—'}m → {l.dropTime||'—'}m · {l.dropTemp||'—'}°</td>
                      <td className="mono dim">{d.dtr? d.dtr+'%':'—'}</td>
                      <td className="mono" style={{color:'var(--gold)'}}>{c? c.score.toFixed(1) : <span className="muted">—</span>}</td>
                      <td>{c? <Stars value={c.rating} readOnly/> : <button className="btn sm" onClick={(e)=>{e.stopPropagation();setCuppingFor(l);}}>Cupping</button>}</td>
                      <td><button className="btn sm ghost icon" onClick={(e)=>{e.stopPropagation();setEditing(l);}}><I name="edit" size={13}/></button></td>
                    </tr>
                  );
                })}
                {filtered.length===0 && <tr><td colSpan={13} className="muted" style={{textAlign:'center',padding:40}}>Belum ada log roast.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='new' && (
        <RoastSession initial={editing} onClose={()=>{setEditing(null);setTab('history');}}/>
      )}

      {tab==='recommendations' && (
        <div className="col gap-md">
          <div>
            <div className="eyebrow">Engine</div>
            <h3 style={{fontSize:'clamp(28px, 3.5vw, 38px)',margin:'10px 0'}}>Resep roasting <em>terbaik</em> per bean & proses</h3>
            <div className="dim" style={{maxWidth:600,lineHeight:1.65}}>Berdasarkan rata-rata cupping score (bukan taste notes). Dikelompokkan per nama bean dan proses, dengan roast level terbaik untuk masing-masing.</div>
          </div>
          {recs.length===0 ? <div className="muted">Belum cukup data cupping.</div> :
            <div className="grid-2 mt-md">
              {recs.map(r=>(
                <div key={r.bean.id} style={{padding:'24px 4px 24px 22px',borderLeft:'1px solid var(--gold)'}}>
                  <div className="label">{r.bean.origin} · {r.bean.process}</div>
                  <h3 style={{fontSize:30,margin:'10px 0 12px',color:'var(--cotton)'}}>{r.bean.name}</h3>
                  <div className="row mt-sm" style={{flexWrap:'wrap'}}>
                    <span className="roast-pill" style={{'--bg':ROAST_COLORS[r.best.level]}}>Best: {r.best.level}</span>
                    <span className="pill gold">★ {r.best.avg.toFixed(1)} · {r.best.n} sesi</span>
                    <span className="pill">Avg rating {r.best.avgR.toFixed(1)}/5</span>
                  </div>
                  {r.levels.length>1 && (
                    <div className="mt-md">
                      <div className="label" style={{opacity:.6}}>Level lain:</div>
                      <div className="row mt-sm" style={{flexWrap:'wrap',gap:8}}>
                        {r.levels.slice(1).map(lv=>(
                          <span key={lv.level} className="pill" title={lv.n+' sesi'}>{lv.level} · {lv.avg.toFixed(1)}</span>
                        ))}
                      </div>
                    </div>
                  )}
                  <div className="dim mt-md" style={{lineHeight:1.6,fontSize:13.5}}>{r.bean.notes}</div>
                </div>
              ))}
            </div>
          }
        </div>
      )}

      {editing && tab!=='new' && (
        <Modal title={'Roast · '+editing.beanName} onClose={()=>setEditing(null)} wide>
          <RoastSessionView log={editing} onCupping={()=>{ setCuppingFor(editing); }} onEdit={()=>{setTab('new');}}/>
        </Modal>
      )}

      {cuppingFor && (
        <CuppingModal log={cuppingFor} existing={cupBy[cuppingFor.id]} onClose={()=>setCuppingFor(null)}/>
      )}
    </div>
  );
}

function RoastSession({initial,onClose}){
  const { state, update, toast } = useApp();
  // Identitas
  const [bean,setBean] = useState(initial?.beanId || state.beans[0]?.id || '');
  const [date,setDate] = useState(initial?.date || todayISO());
  const [timeOfRoast,setTimeOfRoast] = useState(initial?.timeOfRoast || new Date().toTimeString().slice(0,5));
  const [roaster,setRoaster] = useState(initial?.roaster || '');
  // Resep
  const [level,setLevel] = useState(initial?.roastLevel || 'Medium');
  const [profile,setProfile] = useState(initial?.profile || '');
  const [batch,setBatch] = useState(initial?.batchSize || 1000);
  const [batchOut,setBatchOut] = useState(initial?.batchOut || '');
  // Kondisi awal
  const [chargeTemp,setChargeTemp] = useState(initial?.chargeTemp || '');
  const [ambientTemp,setAmbientTemp] = useState(initial?.ambientTemp || '');
  const [ambientHum,setAmbientHum] = useState(initial?.ambientHumidity || '');
  const [gasStart,setGasStart] = useState(initial?.gasStart || '');
  const [airflow,setAirflow] = useState(initial?.airflow || '');
  // Curve & milestones
  const [curve,setCurve] = useState(initial?.curve || []);
  const [tp,setTp] = useState(initial?.turningPoint || '');
  const [yp,setYp] = useState(initial?.yellowingPoint || '');
  const [fc,setFc] = useState(initial?.firstCrack || '');
  const [fcEnd,setFcEnd] = useState(initial?.firstCrackEnd || '');
  const [dropT,setDropT] = useState(initial?.dropTime || '');
  const [dropTemp,setDropTemp] = useState(initial?.dropTemp || '');
  // Catatan
  const [desc,setDesc] = useState(initial?.description || '');
  const [notes,setNotes] = useState(initial?.notes || '');
  const [recommendIds,setRecommendIds] = useState(()=> recommendArr(initial?.recommend));

  const [running,setRunning] = useState(false);
  const [elapsed,setElapsed] = useState(0);
  const [t1,setT1] = useState('');
  const [t2,setT2] = useState('');
  const tickRef = useRef(null);

  const beanObj = state.beans.find(b=>b.id===bean);

  // Auto-derived
  const developmentTime = fc && dropT && +dropT>+fc ? +(+dropT - +fc).toFixed(2) : null;
  const dtr = developmentTime && dropT ? +((developmentTime/+dropT)*100).toFixed(1) : null;
  const weightLoss = batch && batchOut && +batch>+batchOut ? +((+batch-+batchOut)/+batch*100).toFixed(2) : null;

  useEffect(()=>{
    if(running){ tickRef.current = setInterval(()=> setElapsed(e=>e+1), 1000); }
    return ()=> clearInterval(tickRef.current);
  },[running]);

  function recordPoint(){
    const t = +(elapsed/60).toFixed(2);
    const T1 = parseFloat(t1)||null, T2 = parseFloat(t2)||null;
    if(T1===null && T2===null){ toast('Isi T1/T2 dulu','warn'); return; }
    setCurve(c=> [...c.filter(p=>Math.abs(p.t-t)>0.05), {t,T1,T2}].sort((a,b)=>a.t-b.t));
    setT1('');setT2('');
  }

  function markMilestone(field, setter){
    const t = +(elapsed/60).toFixed(2);
    setter(t);
    toast(`${field} ditandai pada ${t}m`,'ok');
  }

  function saveLog(){
    const b = state.beans.find(x=>x.id===bean);
    if(!b){ toast('Pilih bean dulu','err'); return; }
    const log = {
      id: initial?.id || 'r'+Date.now(),
      beanId: bean, beanName: b.name, beanProcess: b.process,
      date, timeOfRoast, roaster,
      roastLevel: level, profile,
      batchSize: +batch||null, batchOut: +batchOut||null,
      chargeTemp: +chargeTemp||null,
      ambientTemp: +ambientTemp||null, ambientHumidity: +ambientHum||null,
      gasStart: +gasStart||null, airflow: +airflow||null,
      curve,
      turningPoint: +tp||null, yellowingPoint: +yp||null,
      firstCrack:+fc||null, firstCrackEnd:+fcEnd||null,
      dropTime:+dropT||null, dropTemp:+dropTemp||null,
      description: desc, notes,
      recommend: recommendIds,
    };
    update(s=>({
      roastLogs: initial ? s.roastLogs.map(l=>l.id===log.id?log:l) : [log, ...s.roastLogs]
    }));
    toast(initial?'Sesi diperbarui':'Sesi disimpan. Reminder cupping aktif setelah 7 hari.', 'ok');
    onClose?.();
  }

  const chartRef = useRef(null), chartInst = useRef(null);
  useEffect(()=>{
    if(!chartRef.current) return;
    if(chartInst.current) chartInst.current.destroy();
    const labels = Array.from({length:25},(_,i)=>i+':00');
    const dataT1 = labels.map((_,i)=> curve.find(p=>Math.abs(p.t-i)<0.5)?.T1 ?? null);
    const dataT2 = labels.map((_,i)=> curve.find(p=>Math.abs(p.t-i)<0.5)?.T2 ?? null);
    // Milestone overlay points
    const milestonePts = [];
    if(tp) milestonePts.push({x:+tp+':00',y:dataT1[Math.round(+tp)] ?? 100, label:'TP'});
    chartInst.current = new Chart(chartRef.current,{
      type:'line',
      data:{ labels, datasets:[
        { label:'Beans Temp T1', data:dataT1, borderColor:'#c9a961', backgroundColor:'rgba(201,169,97,.08)', tension:.35, spanGaps:true, pointRadius:2.5, pointBackgroundColor:'#c9a961', borderWidth:1.8 },
        { label:'Drum Temp T2', data:dataT2, borderColor:'#f5efe6', backgroundColor:'rgba(245,239,230,.04)', tension:.35, spanGaps:true, pointRadius:2.5, pointBackgroundColor:'#f5efe6', borderWidth:1.5, borderDash:[5,4] }
      ]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400, easing:'easeOutQuart'},
        plugins:{ legend:{ labels:{ color:'#f5efe6', font:{family:'Inter',size:11,weight:'400'}, usePointStyle:true } } },
        scales:{
          x:{ title:{display:true,text:'Time — minutes', color:'#c9a961', font:{family:'JetBrains Mono',size:10,weight:'500'}}, ticks:{color:'rgba(245,239,230,.5)',font:{family:'JetBrains Mono',size:10}}, grid:{color:'rgba(245,239,230,.06)'} },
          y:{ min:0,max:230, title:{display:true,text:'Temperature °C',color:'#c9a961',font:{family:'JetBrains Mono',size:10,weight:'500'}}, ticks:{color:'rgba(245,239,230,.5)',font:{family:'JetBrains Mono',size:10},stepSize:10}, grid:{color:'rgba(245,239,230,.06)'} }
        }
      }
    });
  },[curve,tp]);

  function fmtElapsed(s){ const m=Math.floor(s/60), ss=s%60; return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }

  // Recommendable products (visible roast beans + fallen liquid)
  const recProducts = state.products.filter(p=>p.visible);

  return (
    <div className="col gap-lg">
      <div>
        <div className="sec-mark"><span className="label">N° 01 — Identitas</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>{initial? <>Edit <em>session</em></> : <>Sesi <em>baru</em></>}</h3>
        <div className="grid-3">
          <div className="field"><label>Bean</label>
            <select className="select" value={bean} onChange={e=>setBean(e.target.value)}>
              {state.beans.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
          </div>
          <div className="field"><label>Proses (auto)</label><input className="input" value={beanObj?.process||'—'} readOnly/></div>
          <div className="field"><label>Origin (auto)</label><input className="input" value={beanObj?.origin||'—'} readOnly/></div>
          <div className="field"><label>Tanggal</label><input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="field"><label>Jam Roast</label><input className="input" type="time" value={timeOfRoast} onChange={e=>setTimeOfRoast(e.target.value)}/></div>
          <div className="field"><label>Roaster</label><input className="input" value={roaster} onChange={e=>setRoaster(e.target.value)} placeholder="Nama operator"/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 02 — Resep & Kondisi</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Resep <em>baru</em></h3>
        <div className="grid-3">
          <div className="field"><label>Roast Level</label>
            <select className="select" value={level} onChange={e=>setLevel(e.target.value)}>
              {ROAST_LEVELS.map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <div className="field"><label>Nama Profile</label><input className="input" value={profile} onChange={e=>setProfile(e.target.value)} placeholder="Standard Med, Wine Light, dll"/></div>
          <div className="field"><label>Batch In (gr)</label><input className="input mono" type="number" value={batch} onChange={e=>setBatch(e.target.value)}/></div>
          <div className="field"><label>Batch Out (gr)</label><input className="input mono" type="number" value={batchOut} onChange={e=>setBatchOut(e.target.value)} placeholder="Berat setelah roast"/></div>
          <div className="field"><label>Weight Loss (auto)</label><input className="input mono" value={weightLoss? weightLoss+'%':'—'} readOnly/></div>
          <div className="field"><label>Charge Temp (°C)</label><input className="input mono" type="number" value={chargeTemp} onChange={e=>setChargeTemp(e.target.value)} placeholder="200"/></div>
          <div className="field"><label>Ambient Temp (°C)</label><input className="input mono" type="number" value={ambientTemp} onChange={e=>setAmbientTemp(e.target.value)} placeholder="28"/></div>
          <div className="field"><label>Humidity (%)</label><input className="input mono" type="number" value={ambientHum} onChange={e=>setAmbientHum(e.target.value)} placeholder="65"/></div>
          <div className="field"><label>Gas Start (%)</label><input className="input mono" type="number" value={gasStart} onChange={e=>setGasStart(e.target.value)} placeholder="60"/></div>
          <div className="field"><label>Airflow (%)</label><input className="input mono" type="number" value={airflow} onChange={e=>setAirflow(e.target.value)} placeholder="50"/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 03 — Live Curve (F4 Template)</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Roast Profile <em>Recorder</em></h3>
        <div className="row mb-md" style={{justifyContent:'space-between',flexWrap:'wrap'}}>
          <div className="row">
            <button className={"btn "+(running?'danger':'primary')} onClick={()=>setRunning(r=>!r)}>
              <I name={running?'pause':'play'} size={12}/>{running?'Pause':'Start'}
            </button>
            <button className="btn ghost" onClick={()=>{setRunning(false);setElapsed(0);}}><I name="stop" size={12}/>Reset</button>
            <div className="mono" style={{fontSize:26,color:'var(--gold)',marginLeft:18,letterSpacing:'.05em'}}>{fmtElapsed(elapsed)}</div>
          </div>
          <div className="row">
            <div className="field" style={{minWidth:88}}><label>T1 °C</label><input className="input mono" value={t1} onChange={e=>setT1(e.target.value)} placeholder="165"/></div>
            <div className="field" style={{minWidth:88}}><label>T2 °C</label><input className="input mono" value={t2} onChange={e=>setT2(e.target.value)} placeholder="210"/></div>
            <button className="btn primary" onClick={recordPoint} style={{marginTop:20}}><I name="plus" size={12}/>Record</button>
          </div>
        </div>
        <div className="row mb-md" style={{gap:8,flexWrap:'wrap'}}>
          <span className="label" style={{opacity:.7}}>Mark milestone (timer berjalan):</span>
          <button className="btn sm ghost" onClick={()=>markMilestone('Turning Point', setTp)}>TP</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('Yellowing', setYp)}>Yellowing</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('1C Start', setFc)}>1C Start</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('1C End', setFcEnd)}>1C End</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('Drop', setDropT)}>Drop</button>
        </div>
        <div className="curve-wrap" style={{height:380}}>
          <canvas ref={chartRef}/>
        </div>
        {curve.length>0 && (
          <div className="row mt-md" style={{justifyContent:'space-between'}}>
            <span className="tiny dim">{curve.length} titik tercatat</span>
            <button className="btn sm ghost" onClick={()=>{ if(confirm('Hapus semua titik kurva?')) setCurve([]); }}><I name="trash" size={11}/>Clear curve</button>
          </div>
        )}
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 04 — Milestones</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Titik <em>kunci</em></h3>
        <div className="grid-4">
          <div className="field"><label>Turning Point (min)</label><input className="input mono" value={tp} onChange={e=>setTp(e.target.value)} placeholder="1.5"/></div>
          <div className="field"><label>Yellowing (min)</label><input className="input mono" value={yp} onChange={e=>setYp(e.target.value)} placeholder="5.0"/></div>
          <div className="field"><label>First Crack Start (min)</label><input className="input mono" value={fc} onChange={e=>setFc(e.target.value)} placeholder="9.5"/></div>
          <div className="field"><label>First Crack End (min)</label><input className="input mono" value={fcEnd} onChange={e=>setFcEnd(e.target.value)} placeholder="11.0"/></div>
          <div className="field"><label>Drop Time (min)</label><input className="input mono" value={dropT} onChange={e=>setDropT(e.target.value)} placeholder="14.0"/></div>
          <div className="field"><label>Drop Temp (°C)</label><input className="input mono" value={dropTemp} onChange={e=>setDropTemp(e.target.value)} placeholder="208"/></div>
          <div className="field"><label>Development Time (auto)</label><input className="input mono" value={developmentTime? developmentTime+' min':'—'} readOnly/></div>
          <div className="field"><label>DTR (auto)</label><input className="input mono" value={dtr? dtr+'%':'—'} readOnly/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 05 — Catatan</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Deskripsi & <em>Rekomendasi</em></h3>
        <div className="grid-2">
          <div className="field"><label>Description (F4 box)</label><textarea className="input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Catatan profil, perubahan gas, warna akhir, dll." style={{minHeight:110}}/></div>
          <div className="field"><label>Notes</label><textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Observasi lain, anomali, gas ramp, airflow change, dll." style={{minHeight:110}}/></div>
        </div>
        <div className="field mt-md"><label>Rekomendasi untuk Produk · pilih nama</label>
          <div className="row" style={{flexWrap:'wrap',gap:8,marginTop:6}}>
            {recProducts.map(p=>{
              const on = recommendIds.includes(p.id);
              return (
                <button key={p.id} type="button" className={"btn sm "+(on?'primary':'ghost')} style={{textTransform:'none',letterSpacing:'.04em',fontFamily:'var(--sans)',fontSize:12}}
                  onClick={()=> setRecommendIds(on? recommendIds.filter(x=>x!==p.id) : [...recommendIds, p.id])}>
                  {on && <I name="check" size={11}/>}{p.name}
                </button>
              );
            })}
            {recProducts.length===0 && <span className="muted tiny">Belum ada produk di Inventory.</span>}
          </div>
          {recommendIds.length>0 && <div className="tiny dim mt-sm">{recommendIds.length} produk dipilih.</div>}
        </div>
      </div>

      <div className="row" style={{justifyContent:'flex-end',paddingTop:14,borderTop:'1px solid var(--line)'}}>
        <button className="btn ghost" onClick={onClose}>Batal</button>
        <button className="btn primary" onClick={saveLog}><I name="check" size={12}/>{initial?'Update':'Simpan'} Session</button>
      </div>
    </div>
  );
}

function RoastSessionView({log,onCupping,onEdit}){
  const { state } = useApp();
  const chartRef = useRef(null);
  const bean = state.beans.find(b=>b.id===log.beanId);
  const d = computeDerived(log);
  const recIds = recommendArr(log.recommend);
  const recProds = recIds.map(id=> state.products.find(p=>p.id===id)).filter(Boolean);

  useEffect(()=>{
    if(!chartRef.current) return;
    const labels = Array.from({length:25},(_,i)=>i+':00');
    const t1 = labels.map((_,i)=> log.curve.find(p=>Math.abs(p.t-i)<0.5)?.T1 ?? null);
    const t2 = labels.map((_,i)=> log.curve.find(p=>Math.abs(p.t-i)<0.5)?.T2 ?? null);
    const c = new Chart(chartRef.current,{type:'line',data:{labels,datasets:[
      {label:'Beans Temp T1',data:t1,borderColor:'#c9a961',backgroundColor:'rgba(201,169,97,.06)',tension:.35,pointRadius:2,borderWidth:1.8,spanGaps:true},
      {label:'Drum Temp T2',data:t2,borderColor:'#f5efe6',backgroundColor:'rgba(245,239,230,.04)',tension:.35,pointRadius:2,borderWidth:1.5,borderDash:[5,4],spanGaps:true}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#f5efe6',font:{family:'Inter',size:11},usePointStyle:true}}},scales:{x:{title:{display:true,text:'Time — minutes',color:'#c9a961',font:{family:'JetBrains Mono',size:10}},ticks:{color:'rgba(245,239,230,.5)',font:{family:'JetBrains Mono'}},grid:{color:'rgba(245,239,230,.06)'}},y:{min:0,max:230,title:{display:true,text:'Temperature °C',color:'#c9a961',font:{family:'JetBrains Mono',size:10}},ticks:{color:'rgba(245,239,230,.5)',font:{family:'JetBrains Mono'},stepSize:10},grid:{color:'rgba(245,239,230,.06)'}}}}});
    return ()=>c.destroy();
  },[log]);

  return (
    <div className="col gap-lg">
      <div>
        <div className="label">Identitas</div>
        <div className="grid-3 mt-md">
          <Fact label="Tanggal" v={fmtDate(log.date)+(log.timeOfRoast?(' · '+log.timeOfRoast):'')}/>
          <Fact label="Roaster" v={log.roaster||'—'}/>
          <Fact label="Bean" v={log.beanName}/>
          <Fact label="Proses" v={log.beanProcess || bean?.process || '—'}/>
          <Fact label="Origin" v={bean?.origin||'—'}/>
          <Fact label="Harvest" v={bean?.harvest||'—'}/>
        </div>
      </div>

      <div>
        <div className="label">Resep & Kondisi</div>
        <div className="grid-4 mt-md">
          <Fact label="Roast Level" v={<span className="roast-pill" style={{'--bg':ROAST_COLORS[log.roastLevel]}}>{log.roastLevel}</span>}/>
          <Fact label="Profile" v={log.profile||'—'}/>
          <Fact label="Batch In" v={(log.batchSize||'—')+'g'}/>
          <Fact label="Batch Out" v={log.batchOut?(log.batchOut+'g'):'—'}/>
          <Fact label="Weight Loss" v={d.weightLoss? <span style={{color:'var(--gold)'}}>{d.weightLoss}%</span> : '—'}/>
          <Fact label="Charge Temp" v={log.chargeTemp?(log.chargeTemp+'°C'):'—'}/>
          <Fact label="Ambient" v={(log.ambientTemp?log.ambientTemp+'°C':'—')+(log.ambientHumidity?' · '+log.ambientHumidity+'%':'')}/>
          <Fact label="Gas · Airflow" v={(log.gasStart?log.gasStart+'%':'—')+' · '+(log.airflow?log.airflow+'%':'—')}/>
        </div>
      </div>

      <div>
        <div className="label">Kurva F4 — T1 (Beans) · T2 (Drum)</div>
        <div className="curve-wrap mt-md" style={{height:320}}><canvas ref={chartRef}/></div>
      </div>

      <div>
        <div className="label">Milestones</div>
        <div className="grid-4 mt-md">
          <Fact label="Turning Point" v={log.turningPoint?(log.turningPoint+' min'):'—'}/>
          <Fact label="Yellowing" v={log.yellowingPoint?(log.yellowingPoint+' min'):'—'}/>
          <Fact label="1C Start" v={log.firstCrack?(log.firstCrack+' min'):'—'}/>
          <Fact label="1C End" v={log.firstCrackEnd?(log.firstCrackEnd+' min'):'—'}/>
          <Fact label="Drop Time" v={log.dropTime?(log.dropTime+' min'):'—'}/>
          <Fact label="Drop Temp" v={log.dropTemp?(log.dropTemp+'°C'):'—'}/>
          <Fact label="Development Time" v={d.developmentTime? <span style={{color:'var(--gold)'}}>{d.developmentTime} min</span> : '—'}/>
          <Fact label="DTR" v={d.dtr? <span style={{color:'var(--gold)'}}>{d.dtr}%</span> : '—'}/>
        </div>
      </div>

      {(log.description || log.notes) && (
        <div className="grid-2">
          {log.description && <div><div className="label">Description</div><div className="dim mt-sm" style={{lineHeight:1.7,whiteSpace:'pre-wrap'}}>{log.description}</div></div>}
          {log.notes && <div><div className="label">Notes</div><div className="dim mt-sm" style={{lineHeight:1.7,whiteSpace:'pre-wrap'}}>{log.notes}</div></div>}
        </div>
      )}

      {recProds.length>0 && (
        <div>
          <div className="label">Rekomendasi untuk Produk</div>
          <div className="row mt-sm" style={{flexWrap:'wrap',gap:8}}>
            {recProds.map(p=><span key={p.id} className="pill gold">{p.name}</span>)}
          </div>
        </div>
      )}

      <div className="row" style={{justifyContent:'space-between',paddingTop:14,borderTop:'1px solid var(--line)'}}>
        {onEdit && <button className="btn ghost" onClick={onEdit}><I name="edit" size={12}/>Edit Session</button>}
        <div style={{flex:1}}/>
        <button className="btn" onClick={()=>window.print()}><I name="print" size={12}/>Print</button>
        <button className="btn primary" onClick={onCupping}><I name="star" size={12}/>Cupping</button>
      </div>
    </div>
  );
}

function CuppingModal({log,existing,onClose}){
  const { update, toast } = useApp();
  const [score,setScore] = useState(existing?.score ?? 85);
  const [rating,setRating] = useState(existing?.rating ?? 4);
  const [sweet,setSweet] = useState(existing?.sweetness ?? 3);
  const [acid,setAcid] = useState(existing?.acidity ?? 3);
  const [body,setBody] = useState(existing?.body ?? 3);
  const [notes,setNotes] = useState(existing?.notes ?? '');

  function save(){
    const c = { id: existing?.id || 'c'+Date.now(), logId: log.id, date: todayISO(),
      score:+score, rating:+rating, sweetness:+sweet, acidity:+acid, body:+body, notes };
    update(s=>({
      cuppings: existing ? s.cuppings.map(x=>x.id===c.id?c:x) : [c, ...s.cuppings]
    }));
    toast('Cupping tersimpan.','ok');
    onClose();
  }

  return (
    <Modal title={<>Cupping · <em>{log.beanName}</em></>} onClose={onClose}>
      <div className="col gap-md">
        <div className="grid-2">
          <div className="field"><label>Cupping Score (0–100)</label><input className="input mono" type="number" value={score} onChange={e=>setScore(e.target.value)}/></div>
          <div className="field"><label>Rating</label><Stars value={rating} onChange={setRating} large/></div>
        </div>
        <div className="grid-3">
          <div className="field"><label>Sweetness</label><Stars value={sweet} onChange={setSweet}/></div>
          <div className="field"><label>Acidity</label><Stars value={acid} onChange={setAcid}/></div>
          <div className="field"><label>Body</label><Stars value={body} onChange={setBody}/></div>
        </div>
        <div className="field"><label>Notes</label><textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)}/></div>
        <div className="row" style={{justifyContent:'flex-end',marginTop:8}}>
          <button className="btn ghost" onClick={onClose}>Batal</button>
          <button className="btn primary" onClick={save}>Simpan Cupping</button>
        </div>
      </div>
    </Modal>
  );
}

function Stars({value=0,onChange,readOnly=false,large=false}){
  return (
    <div className={"stars "+(large?'lg':'')}>
      {[1,2,3,4,5].map(n=>(
        <svg key={n} className={"star "+(n<=value?'on':'')} viewBox="0 0 24 24" fill="currentColor"
          onClick={()=>!readOnly && onChange?.(n)}>
          <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/>
        </svg>
      ))}
    </div>
  );
}

function Fact({label,v}){
  return (
    <div>
      <div className="label">{label}</div>
      <div className="bright mt-sm" style={{fontSize:15,fontWeight:400}}>{v}</div>
    </div>
  );
}

function Modal({title,children,onClose,wide,footer}){
  useEffect(()=>{
    const h=e=>{ if(e.key==='Escape') onClose?.(); };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[onClose]);
  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={wide?{maxWidth:1100}:{}}>
        <div className="modal-h">
          <h2>{title}</h2>
          <div className="close" onClick={onClose}><I name="close"/></div>
        </div>
        <div className="modal-b">{children}</div>
        {footer && <div className="modal-f">{footer}</div>}
      </div>
    </div>
  );
}

function ProductEditor({product, onClose}){
  const { state, update, toast } = useApp();
  const isNew = product._new;
  const [origin,setOrigin] = useState(product.origin || 'single');
  const [mixWith,setMixWith] = useState(product.mixWith || []);
  const [beanId,setBeanId] = useState(product.beanId || state.beans[0]?.id);
  const [name,setName] = useState(product.name || '');
  const [brand,setBrand] = useState(product.brand || 'Taring Naga Roastery');
  const [category,setCategory] = useState(product.category || 'Roast Beans');
  const [roastLevel,setRoastLevel] = useState(product.roastLevel || 'Medium');
  const [weight,setWeight] = useState(product.weight || 200);
  const [diskon,setDiskon] = useState(product.diskon || 0);
  const [stock,setStock] = useState(product.stock || 0);
  const [visible,setVisible] = useState(product.visible ?? true);
  const [tasting,setTasting] = useState(product.tastingNotes || '');
  const [markup,setMarkup] = useState(state.settings.markupPct);
  const [hargaOverride,setHargaOverride] = useState(product.harga || 0);

  const bean = state.beans.find(b=>b.id===beanId);
  const pricing = useMemo(()=> computePricing(bean, +weight, state.settings, +markup), [bean,weight,state.settings,markup]);

  useEffect(()=>{
    if(isNew && !hargaOverride && pricing.roundUp){ setHargaOverride(pricing.roundUp); }
  },[pricing.roundUp]);

  const finalPrice = Math.max(0, (+hargaOverride||0) - (+diskon||0));

  function generateSKU(){
    const b = state.beans.find(x=>x.id===beanId);
    const code = (b?.name||'XX').split(' ').map(s=>s.slice(0,3).toUpperCase()).slice(0,2).join('-');
    const lvl = roastLevel.slice(0,3).toUpperCase();
    return `TN-${code}-${lvl}-${weight}`;
  }

  function save(){
    const sku = product.sku || generateSKU();
    const p = {
      id: product.id || 'p'+Date.now(),
      sku, name: name || `${bean?.name||''} ${weight}g`,
      brand, category, beanId, roastLevel, weight:+weight,
      harga:+hargaOverride, hargaFinal: finalPrice, diskon:+diskon,
      stock:+stock, visible, tastingNotes: tasting,
      mixWith, origin
    };
    update(s=>({
      products: isNew ? [p, ...s.products] : s.products.map(x=>x.id===p.id?p:x)
    }));
    toast(isNew?'Produk ditambahkan':'Produk diperbarui','ok');
    onClose();
  }

  function del(){
    if(!confirm('Hapus produk ini?')) return;
    update(s=>({ products: s.products.filter(p=>p.id!==product.id) }));
    toast('Produk dihapus','ok');
    onClose();
  }

  return (
    <Modal title={isNew?'Produk Baru':<><em>{product.name}</em></>} onClose={onClose} wide
      footer={<>
        {!isNew && <button className="btn danger" onClick={del}><I name="trash" size={11}/>Delete</button>}
        <div style={{flex:1}}/>
        <button className="btn ghost" onClick={onClose}>Batal</button>
        <button className="btn primary" onClick={save}><I name="check" size={12}/>{isNew?'Tambahkan':'Simpan'}</button>
      </>}>
      <div className="col gap-lg">
        <div>
          <div className="label">N° 01 — Info Dasar</div>
          <div className="grid-3 mt-md">
            <div className="field"><label>Nama Produk</label><input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="Auto dari bean + berat"/></div>
            <div className="field"><label>SKU</label><input className="input mono" value={product.sku || generateSKU()} readOnly/></div>
            <div className="field"><label>Brand</label>
              <select className="select" value={brand} onChange={e=>setBrand(e.target.value)}>
                <option>Taring Naga Roastery</option>
                <option>Fallen Liquid</option>
              </select>
            </div>
            <div className="field"><label>Kategori</label>
              <select className="select" value={category} onChange={e=>setCategory(e.target.value)}>
                <option>Green Beans</option><option>Roast Beans</option><option>Fallen Liquid</option>
              </select>
            </div>
            <div className="field"><label>Variant Origin</label>
              <select className="select" value={origin} onChange={e=>setOrigin(e.target.value)}>
                <option value="single">Single Origin</option>
                <option value="mix">Mix / Blend</option>
              </select>
            </div>
            <div className="field"><label>Visibility</label>
              <label className="checkbox" style={{marginTop:10}}>
                <input type="checkbox" checked={visible} onChange={e=>setVisible(e.target.checked)}/> Tampilkan di POS/Web
              </label>
            </div>
          </div>
        </div>

        <div>
          <div className="label">N° 02 — Detail Kopi</div>
          {origin==='single' ? (
            <div className="grid-3 mt-md">
              <div className="field"><label>Bean (Single)</label>
                <select className="select" value={beanId} onChange={e=>setBeanId(e.target.value)}>
                  {state.beans.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </div>
              <div className="field"><label>Process</label><input className="input" value={bean?.process||'—'} readOnly/></div>
              <div className="field"><label>Altitude</label><input className="input" value={bean?.altitude||'—'} readOnly/></div>
              <div className="field"><label>Harvest</label><input className="input" value={bean?.harvest||'—'} readOnly/></div>
              <div className="field"><label>Roast Level</label>
                <select className="select" value={roastLevel} onChange={e=>setRoastLevel(e.target.value)}>
                  {[...ROAST_LEVELS,'—'].map(l=><option key={l}>{l}</option>)}

                    const on = mixWith.includes(b.id);
                    return (
                      <div key={b.id} className="checkbox">
                        <input type="checkbox" checked={on} onChange={()=>{
                          if(on) setMixWith(mixWith.filter(x=>x!==b.id));

                        }}/>

            <Fact label="Bean Cost / Pack" v={fmtIDR(pricing.beanCost)}/>
            <Fact label={`+ Packaging+Sticker+Roasting`} v={fmtIDR(state.settings.packagingCost+state.settings.stickerCost+state.settings.roastingFee)}/>
            <Fact label="HPP" v={<span style={{color:'var(--gold)'}}>{fmtIDR(pricing.hpp)}</span>}/>
          </div>
          <div className="grid-4 mt-md">
            <div className="field"><label>Markup %</label><input className="input mono" type="number" value={markup} onChange={e=>setMarkup(e.target.value)}/></div>
            <Fact label="Harga (markup)" v={fmtIDR(pricing.baseSell)}/>
            <Fact label="Round-up" v={<span style={{color:'var(--gold)'}}>{fmtIDR(pricing.roundUp)}</span>}/>
